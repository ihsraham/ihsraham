name: Profile Stats
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ihsraham
          filename: github-metrics.svg
          template: classic
          config_timezone: Asia/Kolkata

          # Full stats: commits, PRs, issues, repos, languages
          base: header, activity, repositories
          base_indepth: yes

          # 2D contribution calendar (flat heatmap, not 3D isometric)
          plugin_calendar: yes
          plugin_calendar_limit: 1

          # Language breakdown from owned repos only
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_threshold: 1%
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          plugin_languages_ignored: html, css, dockerfile, makefile, shell, scss

          repositories_affiliations: owner

  pixel-profile:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: ihsraham/pixel-profile/action@main
        with:
          github_token: ${{ secrets.METRICS_TOKEN }}
          crt_outputs: |
            github-stats.png?username=ihsraham&include_all_commits=true

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update pixel profile stats"
          file_pattern: "github-stats.png"
