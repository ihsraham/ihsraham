name: Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ihsraham
          filename: github-metrics.svg
          template: classic
          config_timezone: Asia/Kolkata

          # Base: show header stats (commits, PRs, issues, stars)
          # and contribution calendar. No repo/org attribution.
          base: header, activity, repositories
          base_indepth: yes

          # Contribution calendar (isometric 3D view)
          # Shows the green squares without revealing WHERE contributions went
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Languages (inherits owner-only filter from repositories_affiliations)
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_threshold: 1%
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          plugin_languages_ignored: html, css, dockerfile, makefile, shell, scss

          # Only count own repos, not org repos
          repositories_affiliations: owner
