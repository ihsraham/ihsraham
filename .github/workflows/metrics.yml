name: Pixel Profile
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  pixel-profile:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: ihsraham/pixel-profile/action@main
        with:
          github_token: ${{ secrets.METRICS_TOKEN }}
          crt_outputs: |
            github-stats.png?username=ihsraham&include_all_commits=true

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update pixel profile stats"
          file_pattern: "github-stats.png"
